name: EV charger
products:
  - id: dbyqsgkpjt8n3puv
    manufacturer: Platinet
    model: EV charger
entities:
  - entity: sensor
    translation_key: status
    class: enum
    category: diagnostic
    dps:
      - id: 109
        type: string
        optional: true
        name: sensor
        mapping:
          - dps_val: SLEEP
            value: sleep
          - dps_val: IDLE
            value: idle
          - dps_val: IDLEINS
            value: plugged_in
          - dps_val: WORKING
            value: charging
          - dps_val: WAIT
            value: waiting
          - dps_val: ERRORPAUSE
            value: fault
          - dps_val: PAUSE
            value: paused
          - dps_val: STOP
            value: charged
      - id: 102
        type: json
        name: metrics
      - id: 103
        type: json
        optional: true
        name: selftest
      - id: 104
        type: string
        optional: true
        name: alarm
      - id: 105
        type: json
        optional: true
        name: history
      - id: 108
        type: integer
        optional: true
        name: countdown
      - id: 111
        type: string
        optional: true
        name: current_limit
      - id: 157
        type: integer
        optional: true
        name: product_variant
  - entity: sensor
    class: signal_strength
    category: diagnostic
    dps:
      - id: 110
        type: integer
        optional: true
        name: sensor
        unit: dB
        class: measurement
  - entity: sensor
    name: Voltage phase 1
    class: voltage
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: L1.0
        unit: V
        class: measurement
        mapping:
          - scale: 10
  - entity: sensor
    name: Voltage phase 2
    class: voltage
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: L2.0
        unit: V
        class: measurement
        mapping:
          - scale: 10
  - entity: sensor
    name: Voltage phase 3
    class: voltage
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: L3.0
        unit: V
        class: measurement
        mapping:
          - scale: 10
  - entity: sensor
    name: Current phase 1
    class: current
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: L1.1
        unit: A
        class: measurement
        mapping:
          - scale: 1000
  - entity: sensor
    name: Current phase 2
    class: current
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: L2.1
        unit: A
        class: measurement
        mapping:
          - scale: 1000
  - entity: sensor
    name: Current phase 3
    class: current
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: L3.1
        unit: A
        class: measurement
        mapping:
          - scale: 1000
  - entity: sensor
    name: Power
    class: power
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: p
        unit: W
        class: measurement
  - entity: sensor
    name: Temperature
    class: temperature
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: t
        unit: C
        class: measurement
        mapping:
          - scale: 10
  - entity: sensor
    name: Charge energy
    class: energy
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: e
        unit: kWh
        class: total
        mapping:
          - scale: 10
  - entity: sensor
    name: Charge time
    class: duration
    category: diagnostic
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        json_path: d
        unit: s
  - entity: sensor
    name: Last charge energy
    class: energy
    category: diagnostic
    dps:
      - id: 105
        type: integer
        optional: true
        name: sensor
        json_path: c
        unit: kWh
        mapping:
          - scale: 10
      - id: 105
        type: string
        optional: true
        name: start_time
        json_path: s
      - id: 105
        type: string
        optional: true
        name: end_time
        json_path: e
  - entity: sensor
    name: Last charge duration
    class: duration
    category: diagnostic
    dps:
      - id: 105
        type: integer
        optional: true
        name: sensor
        json_path: d
        unit: s
  - entity: sensor
    name: Last self test
    icon: "mdi:check-decagram"
    category: diagnostic
    dps:
      - id: 103
        type: string
        optional: true
        name: sensor
        json_path: t
      - id: 103
        type: string
        optional: true
        name: result
        json_path: r
  - entity: button
    name: Charge
    icon: "mdi:ev-station"
    dps:
      - id: 140
        type: boolean
        optional: true
        name: button
  - entity: button
    name: Stop
    icon: "mdi:stop"
    dps:
      - id: 140
        type: boolean
        optional: true
        name: button
        mapping:
          - dps_val: false
            value: true
  - entity: button
    name: Reset
    icon: "mdi:refresh"
    category: config
    dps:
      - id: 141
        type: boolean
        optional: true
        name: button
  - entity: button
    class: restart
    category: config
    dps:
      - id: 142
        type: boolean
        optional: true
        name: button
  - entity: number
    name: Charge current
    category: config
    class: current
    dps:
      - id: 150
        type: integer
        name: value
        unit: A
        range:
          min: 1
          max: 1000
      - id: 152
        type: integer
        name: maximum
      - id: 107
        type: string
        name: steps
  - entity: number
    name: Maximum current
    category: config
    class: current
    dps:
      - id: 152
        type: integer
        name: value
        unit: A
        range:
          min: 1
          max: 1000
  - entity: select
    name: Plug in action
    icon: "mdi:ev-plug-type2"
    category: config
    dps:
      - id: 154
        type: integer
        optional: true
        name: option
        mapping:
          - dps_val: 0
            value: Prompt
          - dps_val: 1
            value: Charge
          - dps_val: 2
            value: Idle
  - entity: switch
    name: NFC
    icon: "mdi:nfc"
    category: config
    hidden: unavailable
    dps:
      - id: 155
        type: boolean
        name: switch
      - id: 157
        type: integer
        optional: true
        name: available
        mapping:
          - dps_val: 1
            value: false
          - value: true
  - entity: switch
    name: Unearthed
    icon: "mdi:lightning-bolt-circle"
    category: config
    dps:
      - id: 156
        type: boolean
        name: switch
  - entity: number
    name: Operating state
    category: config
    icon: "mdi:state-machine"
    hidden: true
    dps:
      - id: 101
        type: integer
        name: value
        range:
          min: 1
          max: 10000
  - entity: text
    name: Charger info
    category: config
    icon: "mdi:information"
    hidden: true
    dps:
      - id: 106
        type: string
        name: value
  - entity: select
    name: Charge mode
    icon: "mdi:ev-station"
    category: config
    dps:
      - id: 151
        type: integer
        name: option
        json_path: m
        mapping:
          - dps_val: 0
            value: Immediate
          - dps_val: 1
            value: Delayed
          - dps_val: 2
            value: Scheduled
  - entity: number
    name: Charge delay
    icon: "mdi:timer-outline"
    category: config
    dps:
      - id: 151
        type: integer
        name: value
        json_path: dt
        unit: h
        range:
          min: 0
          max: 16
        mapping:
          - scale: 2
  - entity: text
    name: Schedule start
    icon: "mdi:clock-start"
    category: config
    dps:
      - id: 151
        type: string
        name: value
        json_path: ss
  - entity: text
    name: Schedule end
    icon: "mdi:clock-end"
    category: config
    dps:
      - id: 151
        type: string
        name: value
        json_path: se
  - entity: text
    name: Language config
    icon: "mdi:translate"
    category: config
    hidden: true
    dps:
      - id: 153
        type: string
        optional: true
        name: value
  - entity: button
    name: Refresh
    category: config
    hidden: unavailable
    dps:
      - id: 188
        type: boolean
        optional: true
        name: button
      - id: 188
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
